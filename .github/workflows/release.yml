name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1.0
        required: true
        default: v0.1.0
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: HexImg
  GO_VERSION: "1.24"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            goos: windows
            goarch: amd64
            cc: gcc
            cgo_cflags: ""
            artifact_ext: .exe
            windows_arch: x64
            msystem: UCRT64
            msys_packages: mingw-w64-ucrt-x86_64-gcc
          - name: windows-arm64
            runner: windows-11-arm
            goos: windows
            goarch: arm64
            cc: clang
            cgo_cflags: "-DWINBOOL=BOOL -Wno-strict-prototypes"
            artifact_ext: .exe
            windows_arch: arm64
            msystem: CLANGARM64
            msys_packages: mingw-w64-clang-aarch64-clang
          - name: macos-apple-silicon
            runner: macos-14
            goos: darwin
            goarch: arm64
            artifact_ext: ""
          - name: macos-intel
            runner: macos-13
            goos: darwin
            goarch: amd64
            artifact_ext: ""
          - name: linux-x86_64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_ext: ""
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            artifact_ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup MSYS2 for Windows CGO
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: ${{ matrix.msys_packages }}
          path-type: inherit

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download modules
        run: go mod download

      - name: Build Windows binary
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
          CGO_CFLAGS: ${{ matrix.cgo_cflags }}
        run: |
          mkdir -p dist

          if [ "${{ matrix.name }}" = "windows-arm64" ]; then
            export CGO_LDFLAGS="-L${MINGW_PREFIX}/lib"
          fi

          go build -buildvcs=false -trimpath -ldflags "-s -w -H=windowsgui -X main.version=${{ steps.version.outputs.value }}" -o "dist/${APP_NAME}-${{ matrix.name }}${{ matrix.artifact_ext }}" ./cmd/heximg

      - name: Build binary
        if: runner.os != 'Windows'
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
          CGO_CFLAGS: ${{ matrix.cgo_cflags }}
        run: |
          mkdir -p dist
          go build -buildvcs=false -trimpath -ldflags "-s -w -X main.version=${{ steps.version.outputs.value }}" -o "dist/${APP_NAME}-${{ matrix.name }}${{ matrix.artifact_ext }}" ./cmd/heximg

      - name: Package Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $sourceDir = Join-Path $PWD "dist\windows-${{ matrix.windows_arch }}"
          New-Item -ItemType Directory -Force -Path $sourceDir | Out-Null
          Copy-Item "dist\${{ env.APP_NAME }}-${{ matrix.name }}.exe" (Join-Path $sourceDir "${{ env.APP_NAME }}.exe")
          $version = "${{ steps.version.outputs.value }}".TrimStart("v")
          iscc "/DAppVersion=$version" "/DAppArch=${{ matrix.windows_arch }}" "/DSourceDir=$sourceDir" "/DOutputDir=$PWD\dist" "packaging\windows\HexImg.iss"

      - name: Package macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          bundle_version="${{ steps.version.outputs.value }}"
          bundle_version="${bundle_version#v}"
          app_dir="dist/${APP_NAME}.app"
          mkdir -p "$app_dir/Contents/MacOS" "$app_dir/Contents/Resources"
          cp "dist/${APP_NAME}-${{ matrix.name }}" "$app_dir/Contents/MacOS/${APP_NAME}"
          chmod +x "$app_dir/Contents/MacOS/${APP_NAME}"
          cat > "$app_dir/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>${APP_NAME}</string>
            <key>CFBundleIdentifier</key><string>com.hexvork.heximg</string>
            <key>CFBundleName</key><string>${APP_NAME}</string>
            <key>CFBundleDisplayName</key><string>${APP_NAME}</string>
            <key>CFBundleVersion</key><string>${bundle_version}</string>
            <key>CFBundleShortVersionString</key><string>${bundle_version}</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
          tar -czf "dist/${APP_NAME}-${{ matrix.name }}.app.tar.gz" -C dist "${APP_NAME}.app"

      - name: Package Linux tarball
        if: runner.os == 'Linux'
        shell: bash
        run: |
          chmod +x "dist/${APP_NAME}-${{ matrix.name }}"
          tar -czf "dist/${APP_NAME}-${{ matrix.name }}.tar.gz" -C dist "${APP_NAME}-${{ matrix.name }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/*.exe
            dist/*-setup.exe
            dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: HexImg ${{ steps.version.outputs.value }}
          files: dist/*
          generate_release_notes: true
