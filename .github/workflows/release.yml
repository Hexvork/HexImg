name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.0
        required: true
        default: 0.1.0
  push:
    branches:
      - main

permissions:
  contents: write

env:
  APP_NAME: HexImg

jobs:
  windows:
    name: windows-x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 HEIC toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-kvazaar
            mingw-w64-ucrt-x86_64-libpng

      - name: Setup Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          arch: win64_msvc2022_64
          cache: true

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "value=${{ inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            "value=0.0.${{ github.run_number }}" >> $env:GITHUB_OUTPUT
          }

      - name: Package Windows installer
        shell: pwsh
        run: .\scripts\package-windows.ps1 -Version "${{ steps.version.outputs.value }}" -Arch x64

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            exe/*-setup.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: windows
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: HexImg ${{ steps.version.outputs.value }}
          files: dist/*
          generate_release_notes: true
