name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.0
        required: true
        default: 0.1.0
  push:
    branches:
      - main

permissions:
  contents: write

env:
  APP_NAME: HexImg

jobs:
  windows:
    name: windows-${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            qt_arch: win64_msvc2022_64
          - arch: arm64
            qt_arch: win64_msvc2022_arm64_cross_compiled

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 HEIC toolchain
        if: matrix.arch == 'x64'
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-kvazaar
            mingw-w64-ucrt-x86_64-libpng

      - name: Setup Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          arch: ${{ matrix.qt_arch }}
          cache: true

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "value=${{ inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            "value=0.0.${{ github.run_number }}" >> $env:GITHUB_OUTPUT
          }

      - name: Package Windows installer
        shell: pwsh
        run: >-
          .\scripts\package-windows.ps1
          -Version "${{ steps.version.outputs.value }}"
          -Arch "${{ matrix.arch }}"
          -MsysRoot "${{ steps.msys2.outputs.msys2-location }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            exe/*-setup.exe
          if-no-files-found: error

  macos:
    name: macos-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          arch: clang_64
          cache: true

      - name: Install build dependencies
        run: brew install ninja libheif

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=0.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package macOS application
        run: bash scripts/package-unix.sh "${{ steps.version.outputs.value }}" macos "${{ matrix.arch }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/HexImg-macos-*.zip
          if-no-files-found: error

  linux:
    name: linux-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build qt6-base-dev qt6-declarative-dev qt6-svg-dev libheif-examples

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=0.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package Linux application
        run: bash scripts/package-unix.sh "${{ steps.version.outputs.value }}" linux "${{ matrix.arch }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: dist/HexImg-linux-*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [windows, macos, linux]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: HexImg ${{ steps.version.outputs.value }}
          files: dist/*
          generate_release_notes: true
